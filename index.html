<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>通信テスト</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
    .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ccc; }
    button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
    #log { background: #333; color: #0f0; padding: 15px; font-family: monospace; white-space: pre-wrap; min-height: 100px; margin-top: 20px; }
  </style>
</head>
<body>

  <h2>純粋な通信テスト（装飾・入力チェックなし）</h2>
  <p>2MB程度の写真を1枚選び、順番にボタンを押してテストしてください。</p>

  <div class="box">
    <input type="file" id="file-input" accept="image/*"><br><br>
    <button onclick="testBase64()">パターンA：Base64で送信（文字変換）</button><br>
    <button onclick="testFormData()">パターンB：FormDataで送信（生データ）</button><br>
    <button onclick="testIframe()">パターンC：iframeで送信（隠しトンネル）</button>
  </div>

  <h3>テスト結果ログ</h3>
  <div id="log">ここに結果が表示されます...<br></div>

  <script>
    // ★新しく発行したテスト用のGAS URLを貼り付けてください！
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz9mw8mZRO175Ae9TPkNYUu61ALu9ebBMvIjy04uUTvrCsm0tZpFLr3angtQZo19uijaA/exec";

    function logMessage(msg) {
      document.getElementById('log').innerText += msg + "\n";
    }

    async function testBase64() {
      const file = document.getElementById('file-input').files[0];
      if(!file) return alert("画像を選んでください");
      logMessage("--- [パターンA] テスト開始 ---");

      try {
        const base64Data = await new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onload = e => res(e.target.result);
          reader.readAsDataURL(file);
        });

        const res = await fetch(GAS_API_URL, {
          method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ testMethod: 'base64', file: base64Data, name: file.name, mime: file.type })
        });
        const json = await res.json();
        logMessage(json.success ? "✅ 成功！Googleドライブを確認してください" : "❌ 失敗: " + json.error);
      } catch(e) { logMessage("❌ 失敗（通信エラー）: " + e.message); }
    }

    async function testFormData() {
      const file = document.getElementById('file-input').files[0];
      if(!file) return alert("画像を選んでください");
      logMessage("--- [パターンB] テスト開始 ---");

      try {
        const form = new FormData();
        form.append('testMethod', 'formdata');
        form.append('file', file);
        const res = await fetch(GAS_API_URL, {
          method: 'POST', redirect: 'follow', body: form
        });
        const json = await res.json();
        logMessage(json.success ? "✅ 成功！Googleドライブを確認してください" : "❌ 失敗: " + json.error);
      } catch(e) { logMessage("❌ 失敗（通信エラー）: " + e.message); }
    }

    async function testIframe() {
      const file = document.getElementById('file-input').files[0];
      if(!file) return alert("画像を選んでください");
      logMessage("--- [パターンC] テスト開始 ---");

      const iframeName = 'test_iframe_' + Date.now();
      const iframe = document.createElement('iframe');
      iframe.name = iframeName; iframe.style.display = 'none';
      document.body.appendChild(iframe);

      const form = document.createElement('form');
      form.method = 'POST'; form.action = GAS_API_URL;
      form.enctype = 'multipart/form-data'; form.target = iframeName; form.style.display = 'none';

      const hidden = document.createElement('input');
      hidden.type = 'hidden'; hidden.name = 'testMethod'; hidden.value = 'iframe';
      form.appendChild(hidden);

      const dt = new DataTransfer(); dt.items.add(file);
      const fileInput = document.createElement('input');
      fileInput.type = 'file'; fileInput.name = 'file'; fileInput.files = dt.files;
      form.appendChild(fileInput);

      document.body.appendChild(form);

      const handler = function(e) {
        if(e.data && e.data.method === 'iframe') {
          window.removeEventListener('message', handler);
          if(e.data.status === 'success') logMessage("✅ 成功！Googleドライブを確認してください");
          else logMessage("❌ 失敗: " + e.data.error);
        }
      };
      window.addEventListener('message', handler);
      form.submit();
    }
  </script>
</body>
</html>
